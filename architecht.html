<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stat Card</title>
<style>
:root {
  --bg: #0a0f1a;
  --panel: #10243a;
  --panel-2: #0e1d31;
  --accent: #38e8ff;
  --accent-soft: rgba(56, 232, 255, 0.3);
  --bar-empty: #3a3a3a;
  --text: #dfe7f1;
  --muted: #93a7c0;
  --radius: 16px;
}

* { box-sizing: border-box; font-family: Arial, sans-serif; }
html, body { height: 100%; margin: 0; }

/* FIX 1: Only one body block, no duplicates */
body {
  background: radial-gradient(1200px 600px at 20% 0%, #0c1a2b, #07101a 60%, #060a12 100%);
  color: var(--text);
  display: grid;
  place-items: center;
  padding: 24px;
  min-height: 100vh;
}

#start-screen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  color: white;
}

#start-box {
  background: #00418b;
  border: 2px solid var(--accent);
  border-radius: 16px;
  padding: 24px;
  width: 300px;
  text-align: center;
  box-shadow: 0 0 20px var(--accent);
}

#start-box input {
  width: 100%;
  margin: 6px 0;
  padding: 8px;
  border: 1px solid #444;
  border-radius: 6px;
  background: #111;
  color: white;
}

#start-box button {
  margin-top: 12px;
  padding: 10px 18px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  color: black;
}

#start-box button:hover {
  background: #2c9bbf;
}

.card {
  width: min(960px, 95vw);
  background: linear-gradient(180deg, #0e2136 0%, #0a1626 100%);
  border: 2px solid var(--accent);
  border-radius: calc(var(--radius) + 8px);
  padding: 24px 28px 30px;
}

.frame {
  border: 2px solid rgba(56, 232, 255, .35);
  border-radius: var(--radius);
  padding: 20px;
  background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
}

.header {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 20px;
  align-items: stretch;
  margin-bottom: 20px;
}

.avatar {
  border: 2px solid var(--accent);
  border-radius: 14px;
  background: linear-gradient(145deg, #143257, #0b213a 60%);
  box-shadow: inset 0 0 0 2px var(--accent-soft);
  aspect-ratio: 1 / 1;
  display: grid;
  place-items: center;
  color: var(--muted);
  font-weight: 700;
  letter-spacing: .08em;
  font-size: 20px;
}

.info-box {
  border: 2px solid var(--accent);
  border-radius: 14px;
  background: #0b1c30;
  box-shadow: inset 0 0 0 2px var(--accent-soft);
  padding: 18px;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px 20px;
  font-size: 18px;
}

.info-label { color: var(--muted); font-size: 16px; letter-spacing: .06em; }
.info-value { font-weight: 700; font-size: 18px; text-align: right; }

.stats { margin-top: 16px; display: grid; gap: 18px; }

.row {
  display: grid;
  grid-template-columns: 140px 50px 1fr 140px;
  align-items: center;
  gap: 8px;
}

.rank-label {
  font-weight: 700;
  font-size: 13px;
  text-align: right;
  letter-spacing: .04em;
  transition: all 0.3s ease;
}

.rank-flash {
  animation: flash 0.6s ease;
}

@keyframes flash {
  0%   { text-shadow: 0 0 6px #fff, 0 0 12px #38e8ff; }
  50%  { text-shadow: 0 0 20px #fff, 0 0 30px #38e8ff; }
  100% { text-shadow: 0 0 6px #fff, 0 0 12px #38e8ff; }
}

.label { color: #e8f5ff; font-weight: 800; letter-spacing: .06em; font-size: 18px; }

.bar {
  width: 100%;
  height: 40px;
  background: var(--bar-empty);
  border-radius: 8px;
  display: flex;
  gap: 2px;
  padding: 2px;
  overflow: hidden;
  position: relative;
}

/* FIX 2: Inner glow for high ranks applied via a class */
.bar.inner-glow {
  box-shadow:
    inset 4px 0 8px red,
    inset -4px 0 8px red,
    inset 0 4px 8px red,
    inset 0 -4px 8px red;
}
.bar.inner-glow-b{box-shadow:   
   inset 4px 0 8px blue,
    inset -4px 0 8px blue,
    inset 0 4px 8px blue,
    inset 0 -4px 8px blue;}
.bar.inner-glow-c{box-shadow:    
  inset 4px 0 8px yellow,
    inset -4px 0 8px yellow,
    inset 0 4px 8px yellow,
    inset 0 -4px 8px yellow;}
.bar.inner-glow-d{box-shadow:    
  inset 4px 0 8px purple,
    inset -4px 0 8px purple,
    inset 0 4px 8px purple,
    inset 0 -4px 8px purple;}
.tick {
  flex: none;
  aspect-ratio: 2 / 2;
  background-color: #555;
  border-radius: 0px;
  transition: background-color 0.3s ease, box-shadow 0.3s ease;
  box-shadow: inset 0 0 4px rgba(0,0,0,0.5);
}

/* LR special text style */
.rank-lr {
  font-weight: bold;
  font-size: 11px;
  background: linear-gradient(135deg, white 25%, transparent 25%, transparent 75%, white 75%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 8px #fe8889, 0 0 16px #ffbdbe;
}

button {
  background-color: #222;
  border: 1px solid #444;
  color: white;
  padding: 6px 12px;
  font-size: 14px;
  border-radius: 4px;
  cursor: pointer;
  margin-right: 4px;
}
button:hover { background-color: #444; }

select {
  background-color: #222;
  border: 1px solid #444;
  color: white;
  padding: 6px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
}

@media (max-width: 520px) {
  .row { grid-template-columns: 100px 40px 1fr 100px; }
  .bar { height: 30px; }
}
</style>
</head>
<body>

<div id="start-screen">
  <div id="start-box">
    <h2>Incoming System Call...</h2>
    <p>Enter your credentials to access your status card</p>
    <label>USERNAME:</label>
    <input type="text" id="username-input" placeholder="Enter your username" />
    <label>HEIGHT:</label>
    <input type="number" id="height-input" placeholder="Enter your height in cm" />
    <label>WEIGHT:</label>
    <input type="number" id="weight-input" placeholder="Enter your weight in kg" />
    <button onclick="startSystem()">Start</button>
  </div>
</div>

<div class="card">
  <div class="frame">
    <div class="header">
      <div class="avatar" id="avatar-display">USERNAME</div>
      <div class="info-box">
        <div class="info-label">HEIGHT</div><div class="info-value" id="height">-- cm</div>
        <div class="info-label">WEIGHT</div><div class="info-value" id="weight">-- kg</div>
      </div>
    </div>

    <div class="stats">
      <div class="row" data-stat="str">
        <div class="label">STRENGTH</div>
        <div class="rank-label">E</div>
        <div class="bar"></div>
        <div>
          <select id="str-select">
            <option value="1">+1</option><option value="5">+5</option><option value="10">+10</option>
            <option value="50">+50</option><option value="100">+100</option>
            <option value="-10">-10</option><option value="-50">-50</option><option value="-100">-100</option>
          </select>
          <button onclick="incrementStat('str')">Add</button>
        </div>
      </div>

      <div class="row" data-stat="agi">
        <div class="label">SPEED</div>
        <div class="rank-label">E</div>
        <div class="bar"></div>
        <div>
          <select id="agi-select">
            <option value="1">+1</option><option value="5">+5</option><option value="10">+10</option>
            <option value="50">+50</option><option value="100">+100</option>
            <option value="-10">-10</option><option value="-50">-50</option><option value="-100">-100</option>
          </select>
          <button onclick="incrementStat('agi')">Add</button>
        </div>
      </div>

      <div class="row" data-stat="pot">
        <div class="label">POTENTIAL</div>
        <div class="rank-label">E</div>
        <div class="bar"></div>
        <div>
          <select id="pot-select">
            <option value="1">+1</option><option value="5">+5</option><option value="10">+10</option>
            <option value="50">+50</option><option value="100">+100</option>
            <option value="-10">-10</option><option value="-50">-50</option><option value="-100">-100</option>
          </select>
          <button onclick="incrementStat('pot')">Add</button>
        </div>
      </div>

      <div class="row" data-stat="int">
        <div class="label">INTELLIGENCE</div>
        <div class="rank-label">E</div>
        <div class="bar"></div>
        <div>
          <select id="int-select">
            <option value="1">+1</option><option value="5">+5</option><option value="10">+10</option>
            <option value="50">+50</option><option value="100">+100</option>
            <option value="-10">-10</option><option value="-50">-50</option><option value="-100">-100</option>
          </select>
          <button onclick="incrementStat('int')">Add</button>
        </div>
      </div>

      <div class="row" data-stat="end">
        <div class="label">ENDURANCE</div>
        <div class="rank-label">E</div>
        <div class="bar"></div>
        <div>
          <select id="end-select">
            <option value="1">+1</option><option value="5">+5</option><option value="10">+10</option>
            <option value="50">+50</option><option value="100">+100</option>
            <option value="-10">-10</option><option value="-50">-50</option><option value="-100">-100</option>
          </select>
          <button onclick="incrementStat('end')">Add</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// --- Start Screen ---
function startSystem() {
  const username = document.getElementById('username-input').value;
  const height   = document.getElementById('height-input').value;
  const weight   = document.getElementById('weight-input').value;

  if (!username || !height || !weight) {
    alert("Please fill in all fields.");
    return;
  }

  document.getElementById('avatar-display').textContent = username;
  document.getElementById('height').textContent = `${height} cm`;
  document.getElementById('weight').textContent = `${weight} kg`;
  document.getElementById('start-screen').style.display = 'none';
}

// --- Stat Data ---
const stats = { str: 0, agi: 0, int: 0, end: 0, pot: 0 };
const lastRanks = { str: "E", agi: "E", int: "E", end: "E", pot: "E" };

// FIX 3: Removed stray comma before {name:"DX"} that crashed JS
const rankList = [
  { name: "E",            min: 0    },
  { name: "E+",           min: 1    },
  { name: "D",            min: 5    },
  { name: "D+",           min: 10   },
  { name: "C",            min: 20   },
  { name: "C+",           min: 30   },
  { name: "B",            min: 40   },
  { name: "B+",           min: 50   },
  { name: "A",            min: 60   },
  { name: "A+",           min: 70   },
  { name: "S",            min: 90   },
  { name: "S+",           min: 100  },
  { name: "SS",           min: 105  },
  { name: "SS+",          min: 115  },
  { name: "SSS",          min: 120  },
  { name: "SSS+",         min: 130  },
  { name: "SR",           min: 140  },
  { name: "SR+",          min: 150  },
  { name: "SSR",          min: 160  },
  { name: "SSR+",         min: 180  },
  { name: "UR",           min: 190  },
  { name: "UR+",          min: 210  },
  { name: "LR",           min: 220  },
  { name: "LR+",          min: 240  },
  { name: "MR",           min: 250  },
  { name: "MR+",          min: 270  },
  { name: "X",            min: 280  },
  { name: "XX",           min: 320  },
  { name: "XXX",          min: 350  },

  { name: "EX",           min: 440  },
  { name: "DX",           min: 470  },
  { name: "CX",           min: 500  },
  { name: "BX",           min: 530  },
  { name: "AX",           min: 590  },
  { name: "SX",           min: 620  },
  { name: "SSX",          min: 700  },
  { name: "UX",           min: 900  },
  { name: "LX",           min: 950  },
  { name: "MX",           min: 975  },
  { name: "XR",           min: 1025 },
  { name: "Unmeasurable", min: 1450 }
];
const rankListpot = [
  { name: "E",            min: 50    },
  { name: "E+",           min: 100   },
  { name: "D",            min: 150    },
  { name: "D+",           min: 200   },
  { name: "C",            min: 250   },
  { name: "C+",           min: 300   },
  { name: "B",            min: 350   },
  { name: "B+",           min: 400   },
  { name: "A",            min: 450   },
  { name: "A+",           min: 500   },
  { name: "S",            min: 550   },
  { name: "S+",           min: 600   },
  { name: "SS",           min: 650   },
  { name: "SS+",          min: 700   },
  { name: "SSS",          min: 750   },
  { name: "SSS+",         min: 800   },
  { name: "Unmeasurable", min: 850 }
];
const rankListint = [
  { name: "E",            min: 50    },
  { name: "E+",           min: 100   },
  { name: "D",            min: 150    },
  { name: "D+",           min: 200   },
  { name: "C",            min: 250   },
  { name: "C+",           min: 300   },
  { name: "B",            min: 350   },
  { name: "B+",           min: 400   },
  { name: "A",            min: 450   },
  { name: "A+",           min: 500   },
  { name: "S",            min: 550   },
  { name: "S+",           min: 600   },
  { name: "SS",           min: 650   },
  { name: "SS+",          min: 700   },
  { name: "SSS",          min: 750   },
  { name: "SSS+",         min: 800   },
  { name: "Unmeasurable", min: 850 }
];
const rankColors = {
  "E":"#555","E+":"#555",
  "D":"#C4A484","D+":"#C4A484",
  "C":"#99ff33","C+":"#99ff33",
  "B":"#3CDFFF","B+":"#3CDFFF",
  "A":"#ff6600","A+":"#ff6600",
  "S":"red","S+":"red","SS":"red","SS+":"red","SSS":"red","SSS+":"red",
  "SR":"#FF6200","SR+":"#FF6200",
  "SSR":"#8b008b","SSR+":"#8b008b",
  "UR":"#33ff33","UR+":"#66ff66",
  "LR":"#fe8889","LR+":"#fe8889",
  "MR":"#ffff33","MR+":"#ffcc33",
  "X":"black",
  "XX":"black","XXX":"black",
  "EX":"black","DX":"black","CX":"black","BX":"black","AX":"black",
  "SX":"black","SSX":"black","UX":'black',
  "LX":"black","MX":"black","XR":"black","Unmeasurable":"black"
};

const rankGradients = {
  "SR":  "linear-gradient(180deg, #FF6200 0%, #FFD700 100%)",
  "SR+": "linear-gradient(180deg, #FF6200 0%, #FFD700 100%)",
  "UR":  "linear-gradient(180deg, #33fffc 0%, #8b00ff 100%)",
  "UR+": "linear-gradient(180deg, #33fffc 0%, #8b00ff 100%)",
  "MR":  "linear-gradient(180deg, #f6e9f8 0%, #9f56ff 100%)",
  "MR+": "linear-gradient(180deg, #f6e9f8 0%, #9f56ff 100%)"
};

const rankGlows = {
  "SR":  "#FF6200",
  "SR+": "#FF6200",
  "UR":  "#8b00ff",
  "UR+": "#8b00ff",
  "MR":  "#9f56ff",
  "MR+": "#9f56ff"
};

// Special outline ranks (hollow black text with colored stroke)
const outlineRanks = {
  "X": "red",
  "XX": "red",
  "XXX": "red",
  "XX": "red",
  "EX": "red",
  "DX": "red",
  "CX": "red",
  "BX": "red",
  "AX": "red",
  "SX": "red",
  "SSX": "red",
  "UX": "#89cfef",
  "LX": "yellow",
  "XR": "yellow",
  "Unmeasurable": "red",
  "MX": "purple",
};

// Ranks that get inner red glow on the bar
const innerGlowRanks = new Set([
  "X","XX","XXX","EX","DX","CX","BX","AX","SX","SSX","Unmeasurable"
]);

function getRank(value,list) {
  let rank = "E";
  for (let r of list) {
    if (value >= r.min) rank = r.name;
  }
  return rank;
}

function updateBar(stat) {
  const row = document.querySelector(`.row[data-stat="${stat}"]`);
  const bar = row.querySelector('.bar');
  const rankLabel = row.querySelector('.rank-label');
  const value = stats[stat];
  const rank = (stat === "pot") ? getRank(value, rankListpot) :
               (stat === "int") ? getRank(value, rankListint) :
                                  getRank(value, rankList);

  // --- Bar inner glow ---
bar.classList.remove("inner-glow","inner-glow-b","inner-glow-c","inner-glow-d");
if (rank==="UX") {
  bar.classList.add("inner-glow-b");}
  if (rank==="LX" || rank==="XR") {
    bar.classList.add("inner-glow-c");
  }
  if (rank==="MX") {
    bar.classList.add("inner-glow-d");
  }
  else if (innerGlowRanks.has(rank)) {
    bar.classList.add("inner-glow");
  }

  // FIX 4: Reset all label styles first, then apply once cleanly
  rankLabel.style.cssText = "font-weight:700; font-size:13px; text-align:right; letter-spacing:0.04em; transition: all 0.3s ease;";
  rankLabel.classList.remove('rank-lr');

  if (rank === "LR" || rank === "LR+") {
    rankLabel.classList.add('rank-lr');

  } else if (outlineRanks[rank]) {
    // Hollow/outline style for ultra-high ranks
    const outlineColor = outlineRanks[rank];
    rankLabel.style.color = "black";
    rankLabel.style.webkitTextStroke = `1px ${outlineColor}`;
    rankLabel.style.textShadow = `0 0 5px ${outlineColor}, 0 0 8px ${outlineColor}`;
    if (rank === "Unmeasurable") {
      rankLabel.style.textAlign = "left";
      rankLabel.style.marginLeft = "-25px";
      rankLabel.style.fontSize = "11px";
    }

  } else if (rankGradients[rank]) {
    rankLabel.style.background = rankGradients[rank];
    rankLabel.style.webkitBackgroundClip = "text";
    rankLabel.style.backgroundClip = "text";
    rankLabel.style.color = "transparent";
    rankLabel.style.textShadow = "none";

  } else {
    // Normal solid color
    const color = rankColors[rank] || "#fff";
    rankLabel.style.color = color;
    rankLabel.style.textShadow = `0 0 8px ${color}, 0 0 16px ${color}`;
  }

  rankLabel.textContent = rank;

  // Flash animation on rank change
  if (rank !== lastRanks[stat]) {
    rankLabel.classList.add('rank-flash');
    setTimeout(() => rankLabel.classList.remove('rank-flash'), 600);
    lastRanks[stat] = rank;
  }

  // --- Bar ticks ---
  bar.innerHTML = "";
  const ticks = Math.min(Math.floor(value / 5), 20);
  for (let i = 0; i < 20; i++) {
    const tick = document.createElement('div');
    tick.className = 'tick';
    if (i < ticks) {
      if (rankGradients[rank]) {
        tick.style.background = rankGradients[rank];
        const glow = rankGlows[rank] || "#FFD700";
        tick.style.boxShadow = `0 0 8px ${glow}, 0 0 16px ${glow}`;
      } else {
        const color = rankColors[rank] || "#38e8ff";
        tick.style.backgroundColor = color;
        tick.style.boxShadow = `0 0 8px ${color}, 0 0 16px ${color}`;
      }
    } else {
      tick.style.backgroundColor = "#555";
      tick.style.boxShadow = "inset 0 0 4px rgba(0,0,0,0.5)";
    }
    bar.appendChild(tick);
  }
}

function incrementStat(stat) {
  const select = document.getElementById(`${stat}-select`);
  stats[stat] = Math.max(0, stats[stat] + parseInt(select.value));
  updateBar(stat);
}

// Init all bars
for (let stat in stats) updateBar(stat);
</script>
</body>
</html>
